# Common proxy headers
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# 1. Public Server (Port 8080 -> Host 4000)
# Purpose: Access management UI, block LLM API access
server {
    listen 8080;
    server_name _;

    # Block LLM API endpoints from public access
    location ~* ^/(v1/|chat/completions|embeddings|images|audio|moderations|models) {
        return 403;
    }

    # Allow everything else (UI, assets, etc.)
    location / {
        proxy_pass http://litellm:4000;
    }
}

# 2. Internal Server (Port 8081 -> Host 127.0.0.1:4040)
# Purpose: Authorized host-only access to all endpoints including API
server {
    listen 8081;
    server_name _;

    location / {
        proxy_pass http://litellm:4000;
    }
}