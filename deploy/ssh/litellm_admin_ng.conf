server {
    listen 8080;
    server_name 0.0.0.0;

    # 1. 允许访问管理后台及所有管理类接口 (/key, /user, /team, /model 等)
    location / {
        proxy_pass http://litellm:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. 拦截所有直接对 LLM 服务 API 的请求（返回 403 Forbidden）
    # 此时外部局域网无法调用 API，只有服务器本机的 localhost:4000 可以调用
    location /v1/ {
        deny all;
    }
    
    location /chat/completions {
        deny all;
    }
}